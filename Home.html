  <style>
    *{

      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:white;
      color:white;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 60px;

    }

    }

    .hero-text h4{
      color:#1dd3b0;
      letter-spacing:2px;
    }

    .hero-text h1{
      font-size:50px;
      margin:10px 0;
    }

    .hero-text span{
      color:#1dd3b0;
    }

    .hero-text p{
      color:#aaa;
      line-height:1.6;
      margin-top:15px;
    }

    .btn{
      margin-top:25px;
      padding:12px 25px;
      border:2px solid #1dd3b0;
      background:transparent;
      color:#1dd3b0;
      font-weight:bold;
      cursor:pointer;
    }

</head>
